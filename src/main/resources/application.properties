spring.application.name=memospark

# MySQL DataSource
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/memospark?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# File upload limits (for import)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# AI Service (OpenAI-compatible API)
ai.api.key=${AI_API_KEY:}
ai.api.url=${AI_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
ai.api.model=${AI_API_MODEL:qwen-turbo}

# Judge0 API
judge0.api.url=${JUDGE0_URL:https://ce.judge0.com}
judge0.api.key=${JUDGE0_KEY:}
judge0.api.host=${JUDGE0_HOST:}
