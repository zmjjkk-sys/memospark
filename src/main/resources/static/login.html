<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MemoSpark — Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 2rem;
    }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: var(--shadow);
    }
    .auth-card h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: var(--primary);
    }
    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid var(--border);
    }
    .auth-tab {
      flex: 1;
      padding: .6rem;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      font-size: .9rem;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
    }
    .auth-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .auth-error {
      color: #ef4444;
      font-size: .85rem;
      margin-bottom: .75rem;
      display: none;
    }
    .auth-error.show { display: block; }
    .auth-success {
      color: #22c55e;
      font-size: .85rem;
      margin-bottom: .75rem;
      display: none;
    }
    .auth-success.show { display: block; }
    .auth-card .form-group { margin-bottom: 1rem; }
    .auth-card .btn { width: 100%; justify-content: center; }
    .brand-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: .5rem;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="brand-title">&#9889; MemoSpark</div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')" id="tab-login">Login</button>
        <button class="auth-tab" onclick="switchTab('register')" id="tab-register">Register</button>
      </div>

      <!-- Login Form -->
      <div id="form-login" class="auth-form active">
        <div id="login-error" class="auth-error"></div>
        <div class="form-group">
          <label for="login-username">Username</label>
          <input id="login-username" type="text" placeholder="Enter username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="Enter password" autocomplete="current-password" />
        </div>
        <button class="btn btn-primary" onclick="doLogin()">Login</button>
      </div>

      <!-- Register Form -->
      <div id="form-register" class="auth-form">
        <div id="register-error" class="auth-error"></div>
        <div id="register-success" class="auth-success"></div>
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input id="reg-username" type="text" placeholder="Choose username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" placeholder="Choose password (min 3 chars)" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label for="reg-password2">Confirm Password</label>
          <input id="reg-password2" type="password" placeholder="Confirm password" autocomplete="new-password" />
        </div>
        <button class="btn btn-primary" onclick="doRegister()">Register</button>
      </div>
    </div>
  </div>

  <script>
    // Check if already logged in
    fetch('/api/auth/me').then(r => {
      if (r.ok) window.location.href = '/';
    });

    // Restore theme
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      document.getElementById('form-' + tab).classList.add('active');
      // Clear errors
      document.querySelectorAll('.auth-error, .auth-success').forEach(e => {
        e.classList.remove('show');
        e.textContent = '';
      });
    }

    async function doLogin() {
      const errEl = document.getElementById('login-error');
      errEl.classList.remove('show');
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      if (!username || !password) {
        errEl.textContent = 'Username and password are required';
        errEl.classList.add('show');
        return;
      }
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.add('show');
        }
      } catch (e) {
        errEl.textContent = 'Network error';
        errEl.classList.add('show');
      }
    }

    async function doRegister() {
      const errEl = document.getElementById('register-error');
      const sucEl = document.getElementById('register-success');
      errEl.classList.remove('show');
      sucEl.classList.remove('show');
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      const password2 = document.getElementById('reg-password2').value;
      if (!username || !password) {
        errEl.textContent = 'Username and password are required';
        errEl.classList.add('show');
        return;
      }
      if (password !== password2) {
        errEl.textContent = 'Passwords do not match';
        errEl.classList.add('show');
        return;
      }
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        if (res.ok) {
          sucEl.textContent = 'Registration successful! Logging in...';
          sucEl.classList.add('show');
          // Auto-login after registration
          const loginRes = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          if (loginRes.ok) {
            window.location.href = '/';
          } else {
            sucEl.textContent = 'Registered! Please login.';
            switchTab('login');
          }
        } else {
          const data = await res.json().catch(() => ({}));
          errEl.textContent = data.error || 'Registration failed';
          errEl.classList.add('show');
        }
      } catch (e) {
        errEl.textContent = 'Network error';
        errEl.classList.add('show');
      }
    }

    // Enter key support
    document.getElementById('login-password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
    document.getElementById('reg-password2').addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
